name: CI
on:
  push:
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Set up Swift 6
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Validate privacy manifest
        run: python3 -c "import pathlib, plistlib; plistlib.load(pathlib.Path('App/PrivacyInfo.xcprivacy').open('rb'))"
      - name: Swift core tests
        shell: bash
        run: |
          set +e
          swift test > swift-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo '=== SWIFT TEST DIAGNOSTICS ==='
            grep -E 'error:|failed|Issue recorded|Test .* failed' swift-test.log | tail -80 || tail -80 swift-test.log
          fi
          exit "$status"

  simulator:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Install XcodeGen
        run: brew install xcodegen >/dev/null 2>&1
      - name: Validate visual asset intake
        run: bash scripts/validate_visual_assets.sh --allow-empty Resources
      - name: Generate project
        run: xcodegen generate >/dev/null
      - name: Test simulator (unit + UI)
        shell: bash
        run: |
          set +e
          simulator_id="$(bash scripts/select_available_iphone_simulator.sh)"
          if [ -z "$simulator_id" ]; then
            echo '=== XCODE DIAGNOSTICS ==='
            echo 'No available iPhone simulator found on this runner.'
            exit 70
          fi
          echo "Using available iPhone simulator $simulator_id"
          # Boot once so unit and UI tests share a warm device.
          xcrun simctl boot "$simulator_id" 2>/dev/null || true
          xcrun simctl bootstatus "$simulator_id" -b || true
          xcodebuild -quiet \
            -project SurveillanceSurvivor.xcodeproj \
            -scheme SurveillanceSurvivor \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$simulator_id" \
            CODE_SIGNING_ALLOWED=NO test > xcodebuild.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo '=== XCODE DIAGNOSTICS ==='
            grep -E 'error:|BUILD FAILED|The following build commands failed|Testing failed|UI Testing Failure|Assertion Failure' xcodebuild.log | tail -100 || tail -100 xcodebuild.log
          fi
          exit "$status"
      - name: Simulator launch smoke
        shell: bash
        run: |
          set +e
          SIMULATOR_SMOKE_ARTIFACTS="$RUNNER_TEMP/simulator-smoke" \
            bash scripts/run_simulator_smoke.sh > smoke.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo '=== SIMULATOR SMOKE DIAGNOSTICS ==='
            tail -120 smoke.log
          else
            echo 'Simulator smoke passed.'
            tail -20 smoke.log
          fi
          exit "$status"
      - name: Upload simulator smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-smoke
          path: |
            ${{ runner.temp }}/simulator-smoke/**
            smoke.log
          if-no-files-found: ignore
