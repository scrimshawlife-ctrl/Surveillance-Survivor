name: CI
on:
  push:
  pull_request:
jobs:
  core:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift core tests
        run: swift test
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build simulator
        run: xcodebuild -project SurveillanceSurvivor.xcodeproj -scheme SurveillanceSurvivor -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 16 Pro' CODE_SIGNING_ALLOWED=NO build
