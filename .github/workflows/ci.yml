name: CI
on:
  push:
  pull_request:
jobs:
  simulator:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen >/dev/null 2>&1
      - name: Generate project
        run: xcodegen generate >/dev/null
      - name: Build simulator
        shell: bash
        run: |
          set +e
          xcodebuild -quiet \
            -project SurveillanceSurvivor.xcodeproj \
            -scheme SurveillanceSurvivor \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO build > xcodebuild.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            grep -E 'error:|BUILD FAILED|The following build commands failed' xcodebuild.log || tail -120 xcodebuild.log
          fi
          exit "$status"
  core-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift core tests
        run: swift test
