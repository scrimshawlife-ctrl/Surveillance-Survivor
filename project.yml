name: SurveillanceSurvivor
options:
  bundleIdPrefix: life.zerostate
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: NO
targets:
  SurveillanceCore:
    type: framework
    platform: iOS
    sources:
      - Sources/SurveillanceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: life.zerostate.surveillancesurvivor.core
        GENERATE_INFOPLIST_FILE: YES
  SurveillanceSurvivor:
    type: application
    platform: iOS
    sources:
      - App
      - Game
    dependencies:
      - target: SurveillanceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: life.zerostate.surveillancesurvivor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Landscape-only iPhone MVP. Portrait must not remain in the generated Info.plist.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UIInterfaceOrientation: UIInterfaceOrientationLandscapeRight
    scheme:
      testTargets:
        - SurveillanceSurvivorTests
  SurveillanceSurvivorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: SurveillanceCore
      - target: SurveillanceSurvivor
