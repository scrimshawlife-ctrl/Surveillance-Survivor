name: SurveillanceSurvivor
options:
  bundleIdPrefix: life.zerostate
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: NO
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
targets:
  SurveillanceCore:
    type: framework
    platform: iOS
    sources:
      - Sources/SurveillanceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: life.zerostate.surveillancesurvivor.core
        GENERATE_INFOPLIST_FILE: YES
  SurveillanceSurvivor:
    type: application
    platform: iOS
    sources:
      - App
      - Game
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: SurveillanceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: life.zerostate.surveillancesurvivor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - SurveillanceSurvivorTests
        - SurveillanceSurvivorUITests
  SurveillanceSurvivorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - SurveillanceSurvivorUITests
    dependencies:
      - target: SurveillanceCore
      - target: SurveillanceSurvivor
  SurveillanceSurvivorUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/SurveillanceSurvivorUITests
    dependencies:
      - target: SurveillanceSurvivor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: life.zerostate.surveillancesurvivor.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SurveillanceSurvivor
        CODE_SIGNING_ALLOWED: "NO"
