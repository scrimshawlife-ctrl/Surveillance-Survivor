name: SurveillanceSurvivor
options:
  bundleIdPrefix: life.zerostate
  deploymentTarget:
    iOS: "18.0"
packages:
  SurveillanceCore:
    path: .
settings:
  base:
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: NO
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
targets:
  SurveillanceSurvivor:
    type: application
    platform: iOS
    sources:
      - App
      - Game
      - Platform
      - Resources
    dependencies:
      - package: SurveillanceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: life.zerostate.surveillancesurvivor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - SurveillanceSurvivorTests
  SurveillanceSurvivorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: SurveillanceSurvivor
      - package: SurveillanceCore
