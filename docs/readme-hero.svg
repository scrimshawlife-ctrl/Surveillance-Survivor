<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Surveillance Survivor</title>
  <desc id="desc">Pixel-inspired surveillance grid with a hooded player escaping through a cyan blind spot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101c"/>
      <stop offset="0.55" stop-color="#11172a"/>
      <stop offset="1" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="blind" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#64fff0" stop-opacity=".88"/>
      <stop offset="1" stop-color="#00b9cc" stop-opacity=".18"/>
    </linearGradient>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#6bfbea" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <g opacity=".22" fill="#f7a84d">
    <rect x="35" y="80" width="125" height="18"/><rect x="52" y="112" width="78" height="12"/>
    <rect x="1010" y="70" width="140" height="18"/><rect x="1050" y="105" width="92" height="12"/>
  </g>
  <path d="M0 492L1200 370V414L0 536Z" fill="#ff214d" opacity=".25"/>
  <path d="M0 504L1200 382" stroke="#ff315c" stroke-width="8" opacity=".72" filter="url(#redGlow)"/>
  <g transform="translate(865 176)">
    <rect x="54" y="82" width="20" height="212" rx="5" fill="#25283b" stroke="#8990b9" stroke-width="4"/>
    <path d="M64 294V378M22 378H106" stroke="#8990b9" stroke-width="8"/>
    <path d="M25 84H150L178 105V164L151 183H25Z" fill="#25283b" stroke="#8990b9" stroke-width="5"/>
    <rect x="118" y="110" width="38" height="45" rx="5" fill="#ef174a" stroke="#ff8ea6" stroke-width="5" filter="url(#redGlow)"/>
    <path d="M156 136L285 208L181 255Z" fill="#ff335a" opacity=".18"/>
  </g>
  <g transform="translate(592 228)" filter="url(#cyanGlow)">
    <rect x="-126" y="-24" width="252" height="292" rx="14" fill="url(#blind)" stroke="#4dffef" stroke-width="5"/>
    <text x="0" y="30" fill="#ecfffb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="34" font-weight="700" text-anchor="middle">BLIND SPOT</text>
  </g>
  <g transform="translate(574 340)">
    <circle cx="0" cy="-38" r="30" fill="#080a11" stroke="#69718d" stroke-width="5"/>
    <path d="M-42-8Q0-35 42-8L54 85H-54Z" fill="#0b0d15" stroke="#69718d" stroke-width="6"/>
    <path d="M-25 80L-65 142M24 80L72 136M-36 8L-98 62M37 10L95 46" stroke="#0b0d15" stroke-width="25" stroke-linecap="square"/>
    <path d="M-25 80L-65 142M24 80L72 136M-36 8L-98 62M37 10L95 46" stroke="#69718d" stroke-width="5"/>
    <rect x="18" y="2" width="14" height="14" fill="#51ffef" filter="url(#cyanGlow)"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="600" y="100" fill="#ffffff" font-size="78" font-weight="900" letter-spacing="2">SURVEILLANCE</text>
    <text x="600" y="178" fill="#ffffff" font-size="78" font-weight="900" letter-spacing="2">SURVIVOR</text>
    <text x="600" y="585" fill="#c8fff8" font-size="27" font-weight="700">STAY UNTRACKABLE. BREAK THE GRID.</text>
  </g>
  <g fill="#55fff0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" opacity=".72">
    <text x="68" y="180">01001101</text><text x="1005" y="265">11010010</text><text x="92" y="350">00110110</text>
  </g>
</svg>